name: Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      tag:
        description: Existing version tag to release, for example v0.1.0
        required: true
        type: string

permissions:
  contents: write

concurrency:
  group: release-${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
  cancel-in-progress: false

jobs:
  release:
    name: Build and release VSIX
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
      GH_TOKEN: ${{ github.token }}

    steps:
      - name: Check out release tag
        uses: actions/checkout@v7
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref }}
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v7
        with:
          node-version: 24
          cache: npm

      - name: Verify release version
        run: npm run verify:release -- "$RELEASE_TAG"

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Package VSIX and checksum
        run: |
          mkdir -p dist
          npm run package -- --out "dist/go-test-tree-toggle-${RELEASE_TAG}.vsix"
          cd dist
          sha256sum "go-test-tree-toggle-${RELEASE_TAG}.vsix" > "go-test-tree-toggle-${RELEASE_TAG}.vsix.sha256"

      - name: Create or update GitHub Release
        run: |
          if gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
            gh release upload "$RELEASE_TAG" dist/* --clobber
          else
            gh release create "$RELEASE_TAG" dist/* \
              --verify-tag \
              --title "Go Test Tree Toggle $RELEASE_TAG" \
              --generate-notes \
              --latest
          fi
