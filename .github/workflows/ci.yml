name: CI

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test-and-package:
    name: Test and package
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Node.js
        uses: actions/setup-node@v7
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Package VSIX
        run: |
          mkdir -p dist
          npm run package -- --out "dist/go-test-tree-toggle-${GITHUB_SHA}.vsix"

      - name: Upload VSIX artifact
        uses: actions/upload-artifact@v7
        with:
          name: go-test-tree-toggle-${{ github.sha }}
          path: dist/*.vsix
          if-no-files-found: error
          retention-days: 14
